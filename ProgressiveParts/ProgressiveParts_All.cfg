@PART[*]:HAS[@MODULE[ModuleParachute]]:FINAL
{
    %minPressure = 11667
	%maxPressure = 11667
    %maxTemp = 4333
}

@PART[*]:HAS[@MODULE[ModuleRCSFX]]:FINAL
{
    %minPressure = 11667
	%maxPressure = 11667
    %maxTemp = 4333
}

@PART[restock-fuel-tank-rcs-radial-tiny-1]:NEEDS[Kerbalism]
{
    %maxPressure = 11667
    %maxTemp = 4333

	%RESOURCE
	{
	%name = MonoPropellant
    %amount = 100    // Текущее количество монотоплива в баке
    %maxAmount = 100 // Максимальный объём бака под монотопливо
	}
}

@PART[rcsTankRadialLong]:NEEDS[Kerbalism]
{
    %maxPressure = 11667
    %maxTemp = 4333

	%RESOURCE
	{
	%name = MonoPropellant
    %amount = 200    // Текущее количество монотоплива в баке
    %maxAmount = 200 // Максимальный объём бака под монотопливо
	}
}