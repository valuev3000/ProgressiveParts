// Tier 8 for nfex-probe-plto-1 (category: probe) -> artificialIntelligence
@PART[nfex-probe-plto-1]:NEEDS[Kerbalism]
{
    @name = nfex-probe-plto-1_L8
    @title = nfex-probe-plto-1 L8
    @description = Tier Max\nPressure: 25000 kPa\nTemp: 6000K

    @mass *= 8.0
	
	!MODULE[HardDrive] {}
	
	@RESOURCE[ElectricCharge]
    {
        @amount *= 16.0
        @maxAmount *= 16.0
    }
	
	MODULE
    {
        name = HardDrive
        dataCapacity = 800  // Настройте ёмкость под свой баланс
        sampleCapacity = 8
    }

    %maxPressure = 25000
    %maxTemp = 6000

	@TechRequired = artificialIntelligence
}

